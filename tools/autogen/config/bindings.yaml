metadata:
  version: "1.0.0"
  description: "Programmatic generation of alignment between C++ core and Python C-API"
  file_outputs:
    - name: cpp_core_enums
      filename: cpp_core_enums_autogen.hxx
      templates: cpp_core_enums_autogen.hxx.jinja2
      output_path: src
    - name: cpp_core_types
      filename: cpp_core_types_autogen.hxx
      templates: cpp_core_types_autogen.hxx.jinja2
      output_path: src
    - name: pycbc_operations
      filename: operations_autogen.hxx
      templates: operations_autogen.hxx.jinja2
      output_path: src
    - name: pycbc_connection
      filename: pycbc_connection.cxx
      templates: pycbc_connection.cxx.jinja2
      output_path: src
    - name: _core
      filename: _core.pyi
      templates: pycbc_core.pyi.jinja2
      output_path: "couchbase/logic/pycbc_core"
    - name: binding_cpp_types
      filename: binding_cpp_types.py
      templates: binding_cpp_types.py.jinja2
      output_path: "couchbase/logic/pycbc_core"
    - name: binding_map_types
      filename: binding_map_types.py
      templates: binding_map_types.py.jinja2
      output_path: "couchbase/logic/pycbc_core"
    - name: operation_types
      filename: operation_types.py
      templates: operation_types.py.jinja2
      output_path: "couchbase/logic"
    - name: binding_map
      filename: binding_map.py
      templates: binding_map.py.jinja2
      output_path: "couchbase/logic"


operation_headers:
 - Python.h
 - pytocbpp_defs.hxx
 - cpp_core_types.hxx
 - cpp_types.hxx
 - cpp_core_enums_autogen.hxx
 - cpp_core_types_autogen.hxx
 - utils.hxx
 - result.hxx
 - <core/operations.hxx>
 - <core/operations/document_view.hxx>
 - <core/operations/management/analytics.hxx>
 - <core/operations/management/bucket.hxx>
 - <core/operations/management/collections.hxx>
 - <core/operations/management/cluster_developer_preview_enable.hxx>
 - <core/operations/management/eventing.hxx>
 - <core/operations/management/query.hxx>
 - <core/operations/management/search.hxx>
 - <core/operations/management/user.hxx>
 - <core/operations/management/view.hxx>
 - <core/tracing/wrapper_sdk_tracer.hxx>

key_value:
  header_path: "core/operations"
  required_cpp_request_fields: [id]
  ignored_cpp_request_fields: [partition, opaque, retries]
  ignored_cpp_response_fields: [ctx]
  with_legacy_durability:
   - append
   - decrement
   - increment
   - insert
   - prepend
   - mutate_in
   - remove
   - replace
   - upsert
  structs_prefix: "couchbase::core::operations::"
  ops_prefix: "document_"
  mutation_operation_headers:
    - document_append.hxx
    - document_insert.hxx
    - document_mutate_in.hxx
    - document_prepend.hxx
    - document_replace.hxx
    - document_upsert.hxx
  operation_headers:
    - document_decrement.hxx
    - document_exists.hxx
    - document_get_all_replicas.hxx
    - document_get_and_lock.hxx
    - document_get_and_touch.hxx
    - document_get_any_replica.hxx
    - document_get.hxx
    - document_get_projected.hxx
    - document_increment.hxx
    - document_lookup_in_all_replicas.hxx
    - document_lookup_in_any_replica.hxx
    - document_lookup_in.hxx
    - document_remove.hxx
    - document_touch.hxx
    - document_unlock.hxx
  operation_overrides:
    - op_name: get_all_replicas
      is_streaming_op: true
      response:
        response_override: "Py_RETURN_NONE;"
    - op_name: lookup_in_all_replicas
      is_streaming_op: true
      response:
        response_override: "Py_RETURN_NONE;"

streaming:
  header_path: "core/operations"
  ignored_cpp_request_fields: [send_to_node, ctx_, extract_encoded_plan_, body_str, row_callback]
  structs_prefix: "couchbase::core::operations::"
  ops_prefix: "document_"
  operation_headers:
    - document_query.hxx
    - document_analytics.hxx
    - document_search.hxx
    - document_view.hxx
  operation_overrides:
    - op_name: analytics
      streaming_op_name: analytics_query
      request:
        required_fields: [statement]
    - op_name: query
      request:
        required_fields: [statement]
    - op_name: search
      streaming_op_name: search_query
      request:
        required_fields: [index_name, query]
    - op_name: document_view
      streaming_op_name: view_query
      request:
        required_fields: [bucket_name, document_name, view_name]

management:
  header_path: "core/operations/management"
  ignored_cpp_response_fields: [ctx]
  structs_prefix: "couchbase::core::operations::management::"
  analytics:
    operation_headers:
      - analytics_dataset_create.hxx
      - analytics_dataset_drop.hxx
      - analytics_dataset_get_all.hxx
      - analytics_dataverse_create.hxx
      - analytics_dataverse_drop.hxx
      - analytics_get_pending_mutations.hxx
      - analytics_index_create.hxx
      - analytics_index_drop.hxx
      - analytics_index_get_all.hxx
      - analytics_link_connect.hxx
      - analytics_link_create.hxx
      - analytics_link_disconnect.hxx
      - analytics_link_drop.hxx
      - analytics_link_get_all.hxx
      - analytics_link_replace.hxx
    operation_overrides:
    - op_name: analytics_link_create
      cpp_request_templates:
        - couchbase::core::management::analytics::couchbase_remote_link
        - couchbase::core::management::analytics::s3_external_link
        - couchbase::core::management::analytics::azure_blob_external_link
    - op_name: analytics_link_replace
      cpp_request_templates:
        - couchbase::core::management::analytics::couchbase_remote_link
        - couchbase::core::management::analytics::s3_external_link
        - couchbase::core::management::analytics::azure_blob_external_link
  bucket:
    operation_headers:
      - bucket_create.hxx
      - bucket_drop.hxx
      - bucket_flush.hxx
      - bucket_get.hxx
      - bucket_get_all.hxx
      - bucket_update.hxx
      - bucket_describe.hxx
  cluster:
    operation_headers:
      - cluster_describe.hxx
      - cluster_developer_preview_enable.hxx
  collection:
    ignored_cpp_request_fields: [retries]
    operation_headers:
      - collection_create.hxx
      - collections_manifest_get.hxx
      - collection_drop.hxx
      - collection_update.hxx
      - scope_create.hxx
      - scope_drop.hxx
      - scope_get_all.hxx
  eventing_function:
    operation_headers:
      - eventing_deploy_function.hxx
      - eventing_drop_function.hxx
      - eventing_get_all_functions.hxx
      - eventing_get_function.hxx
      - eventing_get_status.hxx
      - eventing_pause_function.hxx
      - eventing_resume_function.hxx
      - eventing_undeploy_function.hxx
      - eventing_upsert_function.hxx
  query_index:
    operation_headers:
      - query_index_build.hxx
      - query_index_build_deferred.hxx
      - query_index_create.hxx
      - query_index_drop.hxx
      - query_index_get_all.hxx
      - query_index_get_all_deferred.hxx
  search_index:
    operation_headers:
      - search_get_stats.hxx
      - search_index_analyze_document.hxx
      - search_index_control_ingest.hxx
      - search_index_control_plan_freeze.hxx
      - search_index_control_query.hxx
      - search_index_drop.hxx
      - search_index_get.hxx
      - search_index_get_all.hxx
      - search_index_get_documents_count.hxx
      - search_index_get_stats.hxx
      - search_index_upsert.hxx
  user:
    operation_headers:
      - change_password.hxx
      - group_drop.hxx
      - group_get.hxx
      - group_get_all.hxx
      - group_upsert.hxx
      - role_get_all.hxx
      - user_drop.hxx
      - user_get.hxx
      - user_get_all.hxx
      - user_upsert.hxx
  view_index:
    operation_headers:
      - view_index_drop.hxx
      - view_index_get.hxx
      - view_index_get_all.hxx
      - view_index_upsert.hxx


cpp_core_type_headers:
 - Python.h
 - pytocbpp_defs.hxx
 - cpp_core_types.hxx
